name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            vsce_target: linux-x64
            binary: wowlua_ls
          - os: macos-latest
            target: x86_64-apple-darwin
            vsce_target: darwin-x64
            binary: wowlua_ls
          - os: macos-latest
            target: aarch64-apple-darwin
            vsce_target: darwin-arm64
            binary: wowlua_ls
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            vsce_target: win32-x64
            binary: wowlua_ls.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare extension
        shell: bash
        run: |
          cd editors/vscode
          mkdir -p server
          cp ../../target/${{ matrix.target }}/release/${{ matrix.binary }} server/

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd editors/vscode
          npm version "$VERSION" --no-git-tag-version

      - name: Package VSIX
        shell: bash
        run: |
          cd editors/vscode
          npm install
          npm run build
          npx @vscode/vsce package --target ${{ matrix.vsce_target }} -o ../../wowlua-ls-${{ matrix.vsce_target }}.vsix

      - name: Prepare standalone binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp target/${{ matrix.target }}/release/${{ matrix.binary }} wowlua_ls-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/${{ matrix.binary }} wowlua_ls-${{ matrix.target }}
          fi

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vsce_target }}
          path: wowlua-ls-${{ matrix.vsce_target }}.vsix

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: wowlua_ls-${{ matrix.target }}*

  build-jetbrains:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: binaries

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" editors/jetbrains/build.gradle.kts

      - name: Build plugin
        run: |
          cd editors/jetbrains
          ./gradlew buildPlugin

      - name: Bundle universal plugin with all platform binaries
        shell: bash
        run: |
          cd editors/jetbrains/build/distributions
          PLUGIN_ZIP=$(ls *.zip)
          unzip -q "$PLUGIN_ZIP" -d repack
          for spec in \
            "x86_64-unknown-linux-gnu:linux-x64:wowlua_ls" \
            "x86_64-apple-darwin:darwin-x64:wowlua_ls" \
            "aarch64-apple-darwin:darwin-arm64:wowlua_ls" \
            "x86_64-pc-windows-msvc:win32-x64:wowlua_ls.exe"; do
            IFS=: read -r target platform binary <<< "$spec"
            mkdir -p repack/wowlua-ls/server/${platform}
            cp ../../../../binaries/wowlua_ls-${target}* repack/wowlua-ls/server/${platform}/${binary}
            chmod +x repack/wowlua-ls/server/${platform}/${binary}
          done
          (cd repack && zip -qr ../wowlua-ls-jetbrains.zip wowlua-ls/)

      - name: Upload JetBrains plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: editors/jetbrains/build/distributions/wowlua-ls-jetbrains.zip

  release:
    needs: [build, build-jetbrains]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Download JetBrains plugin
        uses: actions/download-artifact@v4
        with:
          name: jetbrains-plugin

      - name: Generate checksums
        run: sha256sum *.vsix *.zip wowlua_ls-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.vsix
            *.zip
            wowlua_ls-*
            checksums.txt
          body_path: RELEASE_NOTES.md

  notify-discord:
    needs: release
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Post release notes to Discord
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${VERSION}"
          BODY=$(cat RELEASE_NOTES.md | head -c 4000)

          jq -n \
            --arg title "wowlua_ls ${VERSION}" \
            --arg desc "$BODY" \
            --arg url "$RELEASE_URL" \
            '{embeds: [{title: $title, description: $desc, url: $url, color: 5814783}]}' \
          | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Install vsce
        run: npm install -g @vscode/vsce@^3

      - name: Publish to VS Code Marketplace
        run: |
          for vsix in *.vsix; do
            echo "Publishing ${vsix}..."
            vsce publish --packagePath "${vsix}"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-jetbrains:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download JetBrains plugin
        uses: actions/download-artifact@v4
        with:
          name: jetbrains-plugin

      - name: Publish to JetBrains Marketplace
        run: |
          curl -sf \
            -H "Authorization: Bearer ${JETBRAINS_MARKETPLACE_TOKEN}" \
            -F "xmlId=com.tradeskillmaster.wowlua-ls" \
            -F "file=@wowlua-ls-jetbrains.zip" \
            -F "channel=stable" \
            "https://plugins.jetbrains.com/api/updates/upload"
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
