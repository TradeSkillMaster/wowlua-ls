[package]
name = "wowlua_ls"
version = "0.0.0"
repository = "https://github.com/TradeSkillMaster/wowlua_ls"
edition = "2024"
license = "GPL-3.0"

[dependencies]
rayon = "1.10"
line-numbers = "0.4.0"
lsp-server = "=0.7.8"
lsp-types = "0.97.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
bincode = "1.3"
zstd = "0.13"
ureq = "2.10"
regex-lite = "0.1"
quick-xml = "0.37"
url = "2"
log = "0.4"
env_logger = "0.11"

[features]
default = ["embedded-stubs"]
embedded-stubs = []
